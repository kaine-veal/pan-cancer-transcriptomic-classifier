<!DOCTYPE html>
<html>
<head>
    <title>Error</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 { color: #2c3e50; }
        .error {
            background: #fde8e8;
            padding: 20px;
            border-left: 4px solid #e74c3c;
            border-radius: 4px;
        }
        .back-btn {
            background-color: #7f8c8d;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>Error</h1>
    <div class="error">
        <strong>{{ error }}</strong>
    </div>
    <br>
    <a href="/" class="back-btn">← Back to Upload</a>
</body>
</html>
